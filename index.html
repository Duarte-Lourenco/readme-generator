<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GitHub README Generator – Create Professional READMEs Instantly</title>
  <meta name="description" content="Free online GitHub README generator. Create beautiful, professional README.md files for your GitHub projects in seconds. No signup required." />
  <meta name="keywords" content="readme generator, github readme, markdown generator, readme.md, github profile readme, open source readme" />
  <meta name="author" content="README Generator" />
  <meta property="og:title" content="GitHub README Generator – Free & Instant" />
  <meta property="og:description" content="Create professional README.md files for your GitHub projects in seconds. Free, no signup required." />
  <meta property="og:type" content="website" />
  <link rel="canonical" href="https://yourdomain.com/readme-generator" />
 
  <!-- Google AdSense – replace ca-pub-XXXXXXXXXXXXXXXX with your publisher ID -->
  <!--
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-XXXXXXXXXXXXXXXX" crossorigin="anonymous"></script>
  -->
 
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --surface2: #21262d;
      --border: #30363d;
      --accent: #238636;
      --accent-hover: #2ea043;
      --accent2: #1f6feb;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --danger: #da3633;
      --radius: 8px;
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      --mono: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
    }
 
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      line-height: 1.6;
      min-height: 100vh;
    }
 
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
 
    header svg { flex-shrink: 0; }
 
    header h1 {
      font-size: 18px;
      font-weight: 600;
      color: var(--text);
    }
 
    header p {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 2px;
    }
 
    /* ── AdSense top banner placeholder ── */
    .ad-banner {
      background: var(--surface2);
      border: 1px dashed var(--border);
      color: var(--text-muted);
      text-align: center;
      font-size: 11px;
      padding: 4px;
      /* Replace this div with the real AdSense snippet */
      display: none; /* hide until AdSense is active */
    }
 
    .layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      height: calc(100vh - 65px);
    }
 
    @media (max-width: 900px) {
      .layout { grid-template-columns: 1fr; height: auto; }
      .preview-pane { border-top: 1px solid var(--border); }
    }
 
    /* ── LEFT PANEL ── */
    .editor-pane {
      overflow-y: auto;
      border-right: 1px solid var(--border);
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
 
    .section-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .8px;
      color: var(--text-muted);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
 
    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }
 
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
    }
 
    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-muted);
      margin-bottom: 5px;
      margin-top: 12px;
    }
 
    label:first-child { margin-top: 0; }
 
    input[type="text"], textarea, select {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: var(--font);
      font-size: 13px;
      padding: 7px 10px;
      outline: none;
      transition: border-color .15s;
      resize: vertical;
    }
 
    input[type="text"]:focus,
    textarea:focus,
    select:focus {
      border-color: var(--accent2);
      box-shadow: 0 0 0 3px rgba(31,111,235,.15);
    }
 
    textarea { min-height: 70px; }
 
    .badge-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 4px;
    }
 
    .badge-check {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 5px 10px;
      cursor: pointer;
      font-size: 12px;
      user-select: none;
      transition: border-color .15s, background .15s;
    }
 
    .badge-check input { cursor: pointer; accent-color: var(--accent); }
 
    .badge-check:hover {
      border-color: var(--accent2);
      background: var(--surface2);
    }
 
    .tech-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
      gap: 6px;
      margin-top: 4px;
    }
 
    .tech-chip {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 5px 8px;
      cursor: pointer;
      user-select: none;
      transition: border-color .15s, background .15s;
    }
 
    .tech-chip input { cursor: pointer; accent-color: var(--accent2); }
 
    .tech-chip:hover {
      border-color: var(--accent2);
      background: var(--surface2);
    }
 
    .dynamic-list { display: flex; flex-direction: column; gap: 6px; margin-top: 6px; }
 
    .dynamic-row {
      display: flex;
      gap: 6px;
    }
 
    .dynamic-row input { flex: 1; }
 
    .btn-remove {
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 16px;
      padding: 0 10px;
      transition: border-color .15s, color .15s;
    }
 
    .btn-remove:hover { border-color: var(--danger); color: var(--danger); }
 
    .btn-add {
      align-self: flex-start;
      background: none;
      border: 1px dashed var(--border);
      border-radius: 6px;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 12px;
      padding: 5px 12px;
      margin-top: 4px;
      transition: border-color .15s, color .15s;
    }
 
    .btn-add:hover { border-color: var(--accent2); color: var(--accent2); }
 
    /* ── RIGHT PANEL ── */
    .preview-pane {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
 
    .preview-tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      padding: 0 16px;
    }
 
    .tab-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 13px;
      font-family: var(--font);
      padding: 10px 14px;
      position: relative;
      transition: color .15s;
    }
 
    .tab-btn.active { color: var(--text); }
 
    .tab-btn.active::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 0;
      right: 0;
      height: 2px;
      background: var(--accent2);
      border-radius: 2px 2px 0 0;
    }
 
    .preview-actions {
      display: flex;
      gap: 8px;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--surface2);
    }
 
    .btn-copy, .btn-download {
      display: flex;
      align-items: center;
      gap: 6px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      font-family: var(--font);
      font-weight: 500;
      padding: 6px 14px;
      transition: background .15s, opacity .15s;
    }
 
    .btn-copy {
      background: var(--accent);
      border: 1px solid rgba(240,246,252,.1);
      color: #fff;
    }
 
    .btn-copy:hover { background: var(--accent-hover); }
 
    .btn-download {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
    }
 
    .btn-download:hover { background: var(--surface2); }
 
    .btn-copy.copied { background: #1a7f37; }
 
    .preview-content {
      flex: 1;
      overflow-y: auto;
    }
 
    #markdown-raw {
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      font-size: 12px;
      line-height: 1.7;
      padding: 16px;
      white-space: pre-wrap;
      word-break: break-word;
      display: none;
      height: 100%;
    }
 
    #markdown-preview {
      padding: 24px 28px;
      display: block;
    }
 
    /* GitHub-flavoured markdown preview */
    #markdown-preview h1 { font-size: 2em; border-bottom: 1px solid var(--border); padding-bottom: .3em; margin: 0 0 16px; }
    #markdown-preview h2 { font-size: 1.5em; border-bottom: 1px solid var(--border); padding-bottom: .3em; margin: 24px 0 16px; }
    #markdown-preview h3 { font-size: 1.25em; margin: 24px 0 16px; }
    #markdown-preview p  { margin-bottom: 16px; }
    #markdown-preview ul, #markdown-preview ol { margin: 0 0 16px 24px; }
    #markdown-preview li { margin-bottom: 4px; }
    #markdown-preview code { background: var(--surface2); border-radius: 4px; font-family: var(--mono); font-size: .9em; padding: 2px 6px; }
    #markdown-preview pre { background: var(--surface2); border-radius: 6px; overflow-x: auto; padding: 16px; margin-bottom: 16px; }
    #markdown-preview pre code { background: none; padding: 0; }
    #markdown-preview a { color: var(--accent2); text-decoration: none; }
    #markdown-preview a:hover { text-decoration: underline; }
    #markdown-preview img { max-width: 100%; border-radius: 4px; }
    #markdown-preview table { border-collapse: collapse; margin-bottom: 16px; width: 100%; }
    #markdown-preview th, #markdown-preview td { border: 1px solid var(--border); padding: 6px 12px; }
    #markdown-preview th { background: var(--surface2); }
    #markdown-preview blockquote { border-left: 4px solid var(--border); color: var(--text-muted); margin: 0 0 16px; padding: 0 16px; }
    #markdown-preview hr { border: none; border-top: 1px solid var(--border); margin: 24px 0; }
 
    footer {
      text-align: center;
      padding: 10px;
      font-size: 11px;
      color: var(--text-muted);
      border-top: 1px solid var(--border);
      background: var(--surface);
    }
 
    footer a { color: var(--accent2); text-decoration: none; }
  </style>
</head>
<body>
 
<header>
  <svg width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
    <rect width="24" height="24" rx="6" fill="#238636"/>
    <path d="M6 8h12M6 12h8M6 16h10" stroke="white" stroke-width="2" stroke-linecap="round"/>
  </svg>
  <div>
    <h1>GitHub README Generator</h1>
    <p>Create professional README.md files for your projects — free, no signup</p>
  </div>
</header>
 
<!-- AdSense top banner – uncomment and replace ID when approved -->
<div class="ad-banner">Advertisement</div>
 
<div class="layout">
 
  <!-- ════════════════════════════ LEFT PANEL ════════════════════════════ -->
  <div class="editor-pane" id="editor">
 
    <!-- BASICS -->
    <div>
      <div class="section-title">Project basics</div>
      <div class="card">
        <label for="proj-name">Project Name *</label>
        <input type="text" id="proj-name" placeholder="my-awesome-project" />
 
        <label for="proj-tagline">Tagline / Short Description *</label>
        <input type="text" id="proj-tagline" placeholder="A blazing-fast tool that does X" />
 
        <label for="proj-desc">Full Description</label>
        <textarea id="proj-desc" placeholder="Explain what your project does, the problem it solves, and who it's for."></textarea>
 
        <label for="proj-demo">Live Demo URL (optional)</label>
        <input type="text" id="proj-demo" placeholder="https://yourproject.com" />
 
        <label for="proj-screenshot">Screenshot URL (optional)</label>
        <input type="text" id="proj-screenshot" placeholder="https://i.imgur.com/xxxxx.png" />
      </div>
    </div>
 
    <!-- BADGES -->
    <div>
      <div class="section-title">Badges</div>
      <div class="card">
        <div class="badge-row">
          <label class="badge-check"><input type="checkbox" id="badge-license" checked /> License</label>
          <label class="badge-check"><input type="checkbox" id="badge-stars" /> Stars</label>
          <label class="badge-check"><input type="checkbox" id="badge-forks" /> Forks</label>
          <label class="badge-check"><input type="checkbox" id="badge-issues" /> Issues</label>
          <label class="badge-check"><input type="checkbox" id="badge-prs" /> Pull Requests</label>
          <label class="badge-check"><input type="checkbox" id="badge-lastcommit" /> Last Commit</label>
          <label class="badge-check"><input type="checkbox" id="badge-version" /> Version</label>
        </div>
        <label for="badge-repo">GitHub repo (user/repo) for badges</label>
        <input type="text" id="badge-repo" placeholder="username/repository" />
      </div>
    </div>
 
    <!-- TECH STACK -->
    <div>
      <div class="section-title">Tech Stack</div>
      <div class="card">
        <div class="tech-grid" id="tech-grid">
          <!-- populated by JS -->
        </div>
      </div>
    </div>
 
    <!-- FEATURES -->
    <div>
      <div class="section-title">Features</div>
      <div class="card">
        <div class="dynamic-list" id="features-list"></div>
        <button class="btn-add" onclick="addItem('features-list','feature','e.g. Zero-config setup')">+ Add feature</button>
      </div>
    </div>
 
    <!-- INSTALLATION -->
    <div>
      <div class="section-title">Installation</div>
      <div class="card">
        <label for="install-prereq">Prerequisites</label>
        <input type="text" id="install-prereq" placeholder="Node.js >= 18, npm" />
        <label for="install-cmd">Install command</label>
        <textarea id="install-cmd" style="min-height:50px;font-family:var(--mono)" placeholder="npm install my-awesome-project"></textarea>
      </div>
    </div>
 
    <!-- USAGE -->
    <div>
      <div class="section-title">Usage</div>
      <div class="card">
        <label for="usage-code">Code example</label>
        <textarea id="usage-code" style="min-height:90px;font-family:var(--mono)" placeholder="import { myLib } from 'my-awesome-project'&#10;myLib.doSomething()"></textarea>
      </div>
    </div>
 
    <!-- CONTRIBUTING -->
    <div>
      <div class="section-title">Contributing & License</div>
      <div class="card">
        <label for="contrib-text">Contributing note</label>
        <input type="text" id="contrib-text" placeholder="Contributions are welcome! Please open an issue first." />
 
        <label for="license-type">License</label>
        <select id="license-type">
          <option value="MIT">MIT</option>
          <option value="Apache-2.0">Apache 2.0</option>
          <option value="GPL-3.0">GPL 3.0</option>
          <option value="BSD-2-Clause">BSD 2-Clause</option>
          <option value="BSD-3-Clause">BSD 3-Clause</option>
          <option value="ISC">ISC</option>
          <option value="UNLICENSED">Unlicensed / Proprietary</option>
        </select>
 
        <label for="author-name">Author / GitHub username</label>
        <input type="text" id="author-name" placeholder="your-github-username" />
      </div>
    </div>
 
  </div><!-- /editor-pane -->
 
  <!-- ════════════════════════════ RIGHT PANEL ════════════════════════════ -->
  <div class="preview-pane">
    <div class="preview-tabs">
      <button class="tab-btn active" onclick="switchTab('preview')">Preview</button>
      <button class="tab-btn" onclick="switchTab('raw')">Markdown</button>
    </div>
    <div class="preview-actions">
      <button class="btn-copy" id="copy-btn" onclick="copyMarkdown()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        Copy Markdown
      </button>
      <button class="btn-download" onclick="downloadMarkdown()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Download README.md
      </button>
    </div>
    <div class="preview-content">
      <div id="markdown-preview"></div>
      <pre id="markdown-raw"></pre>
    </div>
  </div>
 
</div><!-- /layout -->
 
<footer>
  Made with ❤️ — <a href="#">GitHub README Generator</a> · Free &amp; Open Source
</footer>
 
<script>
/* ─────────────────────────── Tech stack data ─────────────────────────── */
const TECHS = [
  { id:'js',         label:'JavaScript', color:'F7DF1E', logo:'javascript',    logoColor:'black' },
  { id:'ts',         label:'TypeScript', color:'3178C6', logo:'typescript',    logoColor:'white' },
  { id:'python',     label:'Python',     color:'3776AB', logo:'python',        logoColor:'white' },
  { id:'rust',       label:'Rust',       color:'000000', logo:'rust',          logoColor:'white' },
  { id:'go',         label:'Go',         color:'00ADD8', logo:'go',            logoColor:'white' },
  { id:'java',       label:'Java',       color:'ED8B00', logo:'openjdk',       logoColor:'white' },
  { id:'csharp',     label:'C#',         color:'239120', logo:'csharp',        logoColor:'white' },
  { id:'cpp',        label:'C++',        color:'00599C', logo:'cplusplus',     logoColor:'white' },
  { id:'react',      label:'React',      color:'20232A', logo:'react',         logoColor:'61DAFB' },
  { id:'nextjs',     label:'Next.js',    color:'000000', logo:'nextdotjs',     logoColor:'white' },
  { id:'vue',        label:'Vue.js',     color:'4FC08D', logo:'vuedotjs',      logoColor:'white' },
  { id:'svelte',     label:'Svelte',     color:'FF3E00', logo:'svelte',        logoColor:'white' },
  { id:'node',       label:'Node.js',    color:'339933', logo:'nodedotjs',     logoColor:'white' },
  { id:'deno',       label:'Deno',       color:'000000', logo:'deno',          logoColor:'white' },
  { id:'bun',        label:'Bun',        color:'000000', logo:'bun',           logoColor:'white' },
  { id:'docker',     label:'Docker',     color:'2496ED', logo:'docker',        logoColor:'white' },
  { id:'kubernetes', label:'Kubernetes', color:'326CE5', logo:'kubernetes',    logoColor:'white' },
  { id:'postgres',   label:'PostgreSQL', color:'4169E1', logo:'postgresql',    logoColor:'white' },
  { id:'mysql',      label:'MySQL',      color:'4479A1', logo:'mysql',         logoColor:'white' },
  { id:'mongo',      label:'MongoDB',    color:'47A248', logo:'mongodb',       logoColor:'white' },
  { id:'redis',      label:'Redis',      color:'DC382D', logo:'redis',         logoColor:'white' },
  { id:'graphql',    label:'GraphQL',    color:'E10098', logo:'graphql',       logoColor:'white' },
  { id:'tailwind',   label:'Tailwind',   color:'06B6D4', logo:'tailwindcss',  logoColor:'white' },
  { id:'vite',       label:'Vite',       color:'646CFF', logo:'vite',          logoColor:'white' },
  { id:'aws',        label:'AWS',        color:'FF9900', logo:'amazonaws',     logoColor:'white' },
  { id:'gcp',        label:'GCP',        color:'4285F4', logo:'googlecloud',   logoColor:'white' },
];
 
/* ─────────────────────────── State ─────────────────────────── */
let currentMarkdown = '';
 
/* ─────────────────────────── Build tech grid ─────────────────────────── */
const techGrid = document.getElementById('tech-grid');
TECHS.forEach(t => {
  const chip = document.createElement('label');
  chip.className = 'tech-chip';
  chip.innerHTML = `<input type="checkbox" data-tech="${t.id}" /> ${t.label}`;
  techGrid.appendChild(chip);
});
 
/* ─────────────────────────── Dynamic lists ─────────────────────────── */
function addItem(listId, prefix, placeholder) {
  const list = document.getElementById(listId);
  const row = document.createElement('div');
  row.className = 'dynamic-row';
  const input = document.createElement('input');
  input.type = 'text';
  input.placeholder = placeholder;
  input.dataset.type = prefix;
  input.addEventListener('input', generate);
  const del = document.createElement('button');
  del.className = 'btn-remove';
  del.textContent = '×';
  del.onclick = () => { row.remove(); generate(); };
  row.appendChild(input);
  row.appendChild(del);
  list.appendChild(row);
  input.focus();
  generate();
}
 
// Seed with 3 feature rows
['', '', ''].forEach(() => addItem('features-list', 'feature', 'e.g. Blazing-fast performance'));
 
/* ─────────────────────────── Markdown generator ─────────────────────────── */
function val(id) { return (document.getElementById(id)?.value || '').trim(); }
function checked(id) { return document.getElementById(id)?.checked; }
 
function getSelectedTechs() {
  return TECHS.filter(t => document.querySelector(`input[data-tech="${t.id}"]`)?.checked);
}
 
function getDynamicItems(listId) {
  return [...document.querySelectorAll(`#${listId} input[data-type]`)]
    .map(i => i.value.trim()).filter(Boolean);
}
 
function generate() {
  const name        = val('proj-name')        || 'my-project';
  const tagline     = val('proj-tagline')     || 'A short description of your project';
  const desc        = val('proj-desc');
  const demo        = val('proj-demo');
  const screenshot  = val('proj-screenshot');
  const repo        = val('badge-repo');
  const prereq      = val('install-prereq');
  const installCmd  = val('install-cmd');
  const usageCode   = val('usage-code');
  const contrib     = val('contrib-text')     || 'Contributions are welcome! Please open an issue first.';
  const license     = val('license-type')     || 'MIT';
  const author      = val('author-name');
  const techs       = getSelectedTechs();
  const features    = getDynamicItems('features-list');
 
  let md = '';
 
  /* Title + shields */
  md += `# ${name}\n\n`;
  md += `> ${tagline}\n\n`;
 
  if (repo) {
    const shields = [];
    if (checked('badge-license'))    shields.push(`[![License](https://img.shields.io/github/license/${repo}?style=flat-square)](LICENSE)`);
    if (checked('badge-stars'))      shields.push(`[![Stars](https://img.shields.io/github/stars/${repo}?style=flat-square)](https://github.com/${repo}/stargazers)`);
    if (checked('badge-forks'))      shields.push(`[![Forks](https://img.shields.io/github/forks/${repo}?style=flat-square)](https://github.com/${repo}/network)`);
    if (checked('badge-issues'))     shields.push(`[![Issues](https://img.shields.io/github/issues/${repo}?style=flat-square)](https://github.com/${repo}/issues)`);
    if (checked('badge-prs'))        shields.push(`[![PRs](https://img.shields.io/github/issues-pr/${repo}?style=flat-square)](https://github.com/${repo}/pulls)`);
    if (checked('badge-lastcommit')) shields.push(`[![Last Commit](https://img.shields.io/github/last-commit/${repo}?style=flat-square)](https://github.com/${repo}/commits/main)`);
    if (checked('badge-version'))    shields.push(`[![Version](https://img.shields.io/github/v/release/${repo}?style=flat-square)](https://github.com/${repo}/releases)`);
    if (shields.length) md += shields.join(' ') + '\n\n';
  } else if (checked('badge-license')) {
    md += `![License](https://img.shields.io/badge/license-${encodeURIComponent(license)}-blue?style=flat-square)\n\n`;
  }
 
  if (demo)  md += `**[Live Demo](${demo})**`;
  if (demo && repo) md += ` · `;
  if (repo)  md += `[Report Bug](https://github.com/${repo}/issues) · [Request Feature](https://github.com/${repo}/issues)`;
  if (demo || repo) md += '\n\n';
 
  if (screenshot) {
    md += `---\n\n![Screenshot](${screenshot})\n\n`;
  }
 
  /* About */
  if (desc) {
    md += `## About\n\n${desc}\n\n`;
  }
 
  /* Tech stack */
  if (techs.length) {
    md += `## Built With\n\n`;
    md += techs.map(t =>
      `![${t.label}](https://img.shields.io/badge/${encodeURIComponent(t.label)}-${t.color}?style=for-the-badge&logo=${t.logo}&logoColor=${t.logoColor})`
    ).join(' ') + '\n\n';
  }
 
  /* Features */
  if (features.length) {
    md += `## Features\n\n`;
    md += features.map(f => `- ✅ ${f}`).join('\n') + '\n\n';
  }
 
  /* Getting Started */
  md += `## Getting Started\n\n`;
 
  if (prereq) {
    md += `### Prerequisites\n\n\`\`\`bash\n${prereq}\n\`\`\`\n\n`;
  }
 
  if (installCmd) {
    md += `### Installation\n\n\`\`\`bash\n${installCmd}\n\`\`\`\n\n`;
  }
 
  if (usageCode) {
    md += `## Usage\n\n\`\`\`\n${usageCode}\n\`\`\`\n\n`;
  }
 
  /* Contributing */
  md += `## Contributing\n\n${contrib}\n\n`;
  if (repo) {
    md += `1. Fork the repo\n2. Create your feature branch (\`git checkout -b feature/AmazingFeature\`)\n3. Commit your changes (\`git commit -m 'Add some AmazingFeature'\`)\n4. Push to the branch (\`git push origin feature/AmazingFeature\`)\n5. Open a Pull Request\n\n`;
  }
 
  /* License */
  md += `## License\n\nDistributed under the **${license}** License.`;
  if (license === 'MIT') md += ' See `LICENSE` for more information.';
  md += '\n\n';
 
  /* Author */
  if (author) {
    md += `## Author\n\n**${author}**`;
    if (repo) {
      md += ` — [@${author}](https://github.com/${author})`;
    }
    md += '\n\n';
    if (repo) {
      md += `Project link: [https://github.com/${repo}](https://github.com/${repo})\n\n`;
    }
  }
 
  /* Footer */
  md += `---\n\nMade with ❤️ by ${author || 'the author'}\n`;
 
  currentMarkdown = md;
  renderPreview(md);
  document.getElementById('markdown-raw').textContent = md;
}
 
/* ─────────────────────────── Markdown renderer ─────────────────────────── */
function renderPreview(md) {
  const lines = md.split('\n');
  let html = '';
  let i = 0;
 
  function inlineFormat(text) {
    return text
      .replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1" style="max-height:26px;vertical-align:middle;margin:2px 1px"/>')
      .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>')
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.+?)\*/g, '<em>$1</em>')
      .replace(/`([^`]+)`/g, '<code>$1</code>');
  }
 
  while (i < lines.length) {
    const line = lines[i];
 
    // Fenced code block
    if (line.startsWith('```')) {
      let code = '';
      i++;
      while (i < lines.length && !lines[i].startsWith('```')) {
        code += lines[i] + '\n';
        i++;
      }
      html += `<pre><code>${code.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</code></pre>`;
      i++;
      continue;
    }
 
    // Headings
    if (/^### (.+)/.test(line)) { html += `<h3>${inlineFormat(line.slice(4))}</h3>`; i++; continue; }
    if (/^## (.+)/.test(line))  { html += `<h2>${inlineFormat(line.slice(3))}</h2>`; i++; continue; }
    if (/^# (.+)/.test(line))   { html += `<h1>${inlineFormat(line.slice(2))}</h1>`; i++; continue; }
 
    // HR
    if (/^---+$/.test(line.trim())) { html += '<hr/>'; i++; continue; }
 
    // Blockquote
    if (line.startsWith('> ')) { html += `<blockquote>${inlineFormat(line.slice(2))}</blockquote>`; i++; continue; }
 
    // Ordered list
    if (/^\d+\. /.test(line)) {
      html += '<ol>';
      while (i < lines.length && /^\d+\. /.test(lines[i])) {
        html += `<li>${inlineFormat(lines[i].replace(/^\d+\. /, ''))}</li>`;
        i++;
      }
      html += '</ol>';
      continue;
    }
 
    // Unordered list
    if (/^[-*] /.test(line)) {
      html += '<ul>';
      while (i < lines.length && /^[-*] /.test(lines[i])) {
        html += `<li>${inlineFormat(lines[i].slice(2))}</li>`;
        i++;
      }
      html += '</ul>';
      continue;
    }
 
    // Blank line
    if (line.trim() === '') { i++; continue; }
 
    // Paragraph
    let para = '';
    while (i < lines.length && lines[i].trim() !== '' && !lines[i].startsWith('#') && !lines[i].startsWith('```') && !/^[-*] /.test(lines[i]) && !/^\d+\. /.test(lines[i]) && !/^---/.test(lines[i]) && !lines[i].startsWith('> ')) {
      para += (para ? ' ' : '') + lines[i];
      i++;
    }
    if (para) html += `<p>${inlineFormat(para)}</p>`;
  }
 
  document.getElementById('markdown-preview').innerHTML = html;
}
 
/* ─────────────────────────── Tab switching ─────────────────────────── */
let currentTab = 'preview';
function switchTab(tab) {
  currentTab = tab;
  document.getElementById('markdown-preview').style.display = tab === 'preview' ? 'block' : 'none';
  document.getElementById('markdown-raw').style.display     = tab === 'raw'     ? 'block' : 'none';
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-btn')[tab === 'preview' ? 0 : 1].classList.add('active');
}
 
/* ─────────────────────────── Copy / Download ─────────────────────────── */
 
async function copyMarkdown() {
  try {
    await navigator.clipboard.writeText(currentMarkdown);
    const btn = document.getElementById('copy-btn');
    btn.textContent = '✓ Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Copy Markdown'; btn.classList.remove('copied'); }, 2000);
  } catch { alert('Could not copy. Please use the Markdown tab to copy manually.'); }
}
 
function downloadMarkdown() {
  const blob = new Blob([currentMarkdown], { type: 'text/markdown' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'README.md';
  a.click();
}
 
/* ─────────────────────────── Auto-generate on input ─────────────────────────── */
document.getElementById('editor').addEventListener('input', generate);
document.getElementById('editor').addEventListener('change', generate);
 
// Initial render
generate();
</script>
